<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g-col" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="g-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1f42"/>
      <stop offset="100%" stop-color="#070e1f"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="62%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="apex-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="line-glow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="col-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#059669" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#g-bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#bg-glow)"/>

  <!-- Very subtle grid overlay -->
  <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="0.5" opacity="0.03"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="0.5" opacity="0.03"/>

  <!-- Column 1 — shortest -->
  <rect x="68"  y="295" width="108" height="152" rx="16" fill="url(#g-col)" opacity="0.5" filter="url(#col-shadow)"/>

  <!-- Column 2 — medium -->
  <rect x="202" y="208" width="108" height="239" rx="16" fill="url(#g-col)" opacity="0.72" filter="url(#col-shadow)"/>

  <!-- Column 3 — tallest -->
  <rect x="336" y="130" width="108" height="317" rx="16" fill="url(#g-col)" filter="url(#col-shadow)"/>

  <!-- Neural connector line with glow -->
  <polyline
    points="122,295 256,208 390,130"
    stroke="#10b981" stroke-width="8"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none" filter="url(#line-glow)" opacity="0.9"
  />

  <!-- Node at column 1 top -->
  <circle cx="122" cy="295" r="14" fill="#0A1628" stroke="#10b981" stroke-width="7" opacity="0.7"/>

  <!-- Node at column 2 top -->
  <circle cx="256" cy="208" r="14" fill="#0A1628" stroke="#10b981" stroke-width="7" opacity="0.85"/>

  <!-- Apex node — full glow at column 3 top -->
  <circle cx="390" cy="130" r="26" fill="#10b981" filter="url(#apex-glow)"/>
  <circle cx="390" cy="130" r="15" fill="#10b981"/>
  <circle cx="390" cy="130" r="7"  fill="#d1fae5"/>
</svg>
