<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" fill="none">
  <defs>
    <linearGradient id="g-main" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon mark with white background -->
  <rect width="40" height="40" rx="10" fill="#F0FDF4"/>
  <rect width="40" height="40" rx="10" fill="#10b981" fill-opacity="0.06"/>

  <!-- Three ascending columns -->
  <rect x="5"  y="24" width="8" height="10" rx="1.5" fill="url(#g-main)" opacity="0.4"/>
  <rect x="16" y="17" width="8" height="17" rx="1.5" fill="url(#g-main)" opacity="0.65"/>
  <rect x="27" y="11" width="8" height="23" rx="1.5" fill="url(#g-main)"/>

  <!-- Connector line -->
  <polyline
    points="9,24 20,17 31,11"
    stroke="#10b981" stroke-width="1.25"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none" opacity="0.8"
  />

  <!-- Nodes -->
  <circle cx="9"  cy="24" r="1.8" fill="white" stroke="#10b981" stroke-width="1.2" opacity="0.7"/>
  <circle cx="20" cy="17" r="1.8" fill="white" stroke="#10b981" stroke-width="1.2" opacity="0.85"/>
  <!-- Apex -->
  <circle cx="31" cy="11" r="2.5" fill="#10b981" filter="url(#glow)"/>
  <circle cx="31" cy="11" r="1.2" fill="white"/>

  <!-- Wordmark dark for light bg -->
  <text
    x="52" y="28"
    font-family="'Geist', 'Inter', 'SF Pro Display', system-ui, sans-serif"
    font-size="18" font-weight="700" letter-spacing="-0.5"
    fill="#0A1628"
  >Broker</text>
  <text
    x="133" y="28"
    font-family="'Geist', 'Inter', 'SF Pro Display', system-ui, sans-serif"
    font-size="18" font-weight="700" letter-spacing="-0.5"
    fill="#059669"
  >ra</text>

  <!-- Tagline -->
  <text
    x="52" y="38"
    font-family="'Geist', 'Inter', system-ui, sans-serif"
    font-size="7.5" font-weight="400" letter-spacing="1.5"
    fill="#0A1628" opacity="0.35"
  >AI REAL ESTATE CRM</text>
</svg>
