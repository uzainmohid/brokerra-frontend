<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" fill="none">
  <defs>
    <linearGradient id="g-main" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="line-glow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg-glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Icon mark (40×40) ── -->
  <rect width="40" height="40" rx="10" fill="#0A1628"/>
  <rect width="40" height="40" rx="10" fill="url(#bg-glow)" opacity="0.6"/>

  <!-- Three ascending columns -->
  <rect x="5"  y="24" width="8" height="10" rx="1.5" fill="url(#g-main)" opacity="0.55"/>
  <rect x="16" y="17" width="8" height="17" rx="1.5" fill="url(#g-main)" opacity="0.78"/>
  <rect x="27" y="11" width="8" height="23" rx="1.5" fill="url(#g-main)"/>

  <!-- Neural connector line -->
  <polyline
    points="9,24 20,17 31,11"
    stroke="#10b981" stroke-width="1.25"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none" filter="url(#line-glow)" opacity="0.9"
  />

  <!-- Node dots -->
  <circle cx="9"  cy="24" r="1.8" fill="#0A1628" stroke="#10b981" stroke-width="1.2" opacity="0.7"/>
  <circle cx="20" cy="17" r="1.8" fill="#0A1628" stroke="#10b981" stroke-width="1.2" opacity="0.85"/>
  <!-- Apex glow node -->
  <circle cx="31" cy="11" r="2.5" fill="#10b981" filter="url(#glow)"/>
  <circle cx="31" cy="11" r="1.2" fill="#d1fae5"/>

  <!-- ── Wordmark ── -->
  <!-- "Broker" in white -->
  <text
    x="52" y="28"
    font-family="'Geist', 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif"
    font-size="18"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#FFFFFF"
  >Broker</text>

  <!-- "ra" in emerald -->
  <text
    x="133" y="28"
    font-family="'Geist', 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif"
    font-size="18"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#10b981"
  >ra</text>

  <!-- Tagline -->
  <text
    x="52" y="38"
    font-family="'Geist', 'Inter', system-ui, sans-serif"
    font-size="7.5"
    font-weight="400"
    letter-spacing="1.5"
    fill="#FFFFFF"
    opacity="0.3"
  >AI REAL ESTATE CRM</text>
</svg>
