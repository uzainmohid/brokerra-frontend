<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0A1628"/>

  <!-- Three columns, simplified for small size -->
  <rect x="4"  y="19" width="6" height="8"  rx="1" fill="url(#g)" opacity="0.55"/>
  <rect x="13" y="13" width="6" height="14" rx="1" fill="url(#g)" opacity="0.78"/>
  <rect x="22" y="8"  width="6" height="19" rx="1" fill="url(#g)"/>

  <!-- Connector line -->
  <polyline
    points="7,19 16,13 25,8"
    stroke="#10b981" stroke-width="1.2"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none"
  />

  <!-- Apex node -->
  <circle cx="25" cy="8" r="2.2" fill="#10b981" filter="url(#glow)"/>
  <circle cx="25" cy="8" r="1"   fill="#d1fae5"/>
</svg>
